<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GORILLA</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

img{
    width:350px;

    position:absolute;
    bottom:-500px;

    animation: rise 4s ease forwards;
}

.text{
    position:absolute;
    bottom:80px;

    color:white;
    font-size:40px;
    font-weight:bold;

    font-family:Arial;

    text-align:center;

    opacity:0;

    animation: showText 2s ease forwards;
    animation-delay:2.5s;
}

@keyframes rise{
    from{
        bottom:-500px;
    }

    to{
        bottom:120px;
    }
}

@keyframes showText{
    from{
        opacity:0;
        transform:scale(0.5);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

</style>
</head>

<body>

<img src="gorilla.png">

<div class="text">
    YOU ARE FUCKING GAY
</div>

<audio autoplay>
    <source src="monkey.mp3" type="audio/mpeg">
</audio>

</body>
</html>
